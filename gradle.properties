# Done to increase the memory available to Gradle.
org.gradle.jvmargs=-Xmx4G
org.gradle.parallel=true

# Mod properties
mod_version = 0.0.1-alpha.1
maven_group = io.github.yuieii.cosmetics
archives_name = ue-cosmetics

# Enabled Architectury platforms
# Supported options: fabric, forge, neoforge, quilt
enabled_platforms = fabric,neoforge

# Minecraft properties
minecraft_version = 1.21

# ParchmentMC
enable_parchmentmc = true
parchmentmc_version = 1.21:2024.07.07

# Dependencies
# architectury_api_version = 13.0.2
fabric_loader_version = 0.16.0
fabric_api_version = 0.100.6+1.21
forge_version = 1.21-51.0.24
neoforge_version = 21.0.42-beta
quilt_loader_version = 0.26.1-beta.1
quilted_fabric_api_version = 11.0.0-alpha.2+0.100.4-1.21
